<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#2D6A4F"/>
  <!-- Box/kit shape -->
  <rect x="14" y="26" width="36" height="26" rx="3" fill="#ffffff" opacity="0.95"/>
  <!-- Box lid -->
  <rect x="12" y="22" width="40" height="8" rx="3" fill="#F4A261"/>
  <!-- Ribbon on lid -->
  <rect x="30" y="22" width="4" height="8" fill="#E76F51"/>
  <!-- Ribbon bow top left -->
  <ellipse cx="27" cy="21" rx="5" ry="3.5" fill="#E76F51" transform="rotate(-15 27 21)"/>
  <!-- Ribbon bow top right -->
  <ellipse cx="37" cy="21" rx="5" ry="3.5" fill="#E76F51" transform="rotate(15 37 21)"/>
  <!-- Center knot -->
  <circle cx="32" cy="22" r="3" fill="#F4A261"/>
  <!-- Star sparkle -->
  <circle cx="22" cy="38" r="2" fill="#F4A261"/>
  <circle cx="42" cy="42" r="1.5" fill="#95D5B2"/>
  <circle cx="32" cy="44" r="2.5" fill="#B7E4C7" opacity="0.8"/>
</svg>
